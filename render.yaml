services:
  - type: web
    name: ips-generator
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn ips_generator.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: false
      - key: WEB_CONCURRENCY
        value: 4
    dependencies:
      - type: postgresql
        name: ips-db
        ipAllowList: []

databases:
  - name: ips-db
    databaseName: ips_db
    user: ips_user
    plan: free 